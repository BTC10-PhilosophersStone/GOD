spring:
  ai:
    bedrock:
      converse:
        chat:
          options:
            model: amazon.nova-pro-v1:0
            temperature: 0
            max-tokens: 4000
  datasource:
    url: jdbc:postgresql://localhost:5432/god
    username: user
    password:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect